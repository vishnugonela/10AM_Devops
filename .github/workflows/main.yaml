name: myapp-workflow
on:
  push:
    branches: ["vishnu"]

jobs:
   build:
      runs-on: ubuntu-22.04

      steps:
        - uses: actions/checkout@v4
        - name: server details
          run: |
            echo "Hello , printing server ip: `hostname -I`"
            echo "Hello , printing serevr name: `hostname`"
   test:
     runs-on: ubuntu-24.04
     steps:
       - uses: actions/checkout@v4
       - name: Create content file
         run: |
           echo "This is github actions workflow file" > /tmp/file.txt
           echo "Printing file.txt content details"
           wc < /tmp/file.txt
